name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }} -DnvdApiDelay=16000

      - name: Run unit tests
        run: mvn test
        env:
          OPENAI_API_KEY: "dummy-key"
          API_CLIENT_SECRET: "dummy-secret"

  publish-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/min-spring-app:latest
            ${{ secrets.DOCKER_USERNAME }}/min-spring-app:${{ github.sha }}

      - name: Automated Deployment Step
        run: |
          echo "Simulating deployment to production server..."
          echo "Pulling image: ${{ secrets.DOCKER_USERNAME }}/min-spring-app:${{ github.sha }}"
          echo "Deployment successful."